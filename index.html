<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOID LION</title>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <base href="./">
    <link rel="manifest" href="./manifest.json">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #000; 
            color: #fff; 
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }
        
        #loadingScreen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        
        .loading-content { text-align: center; }
        .loading-content i { font-size: 70px; color: #00f2ff; animation: pulse 1.5s infinite; }
        .loading-content h1 { font-size: 36px; margin-top: 20px; color: #00f2ff; font-family: 'Orbitron', sans-serif; }
        
        .spinner {
            width: 50px; height: 50px; margin: 30px auto 0;
            border: 3px solid rgba(0,242,255,0.1); border-top-color: #00f2ff;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        @keyframes spin { to{transform:rotate(360deg)} }
        
        #app { display: none; height: 100vh; width: 100vw; position: relative; }
        #app.ready { display: block; }
        
        .page { display: none; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; }
        .page.active { display: block; }
        
        /* شريط علوي ثابت */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
            pointer-events: none;
        }
        
        .top-bar * { pointer-events: auto; }
        
        .top-bar-left { display: flex; align-items: center; gap: 12px; }
        .top-bar-right { display: flex; align-items: center; gap: 12px; }
        
        .icon-btn {
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border: 1px solid rgba(0,242,255,0.3); border-radius: 50%;
            width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 18px; cursor: pointer; position: relative;
        }
        
        .badge {
            position: absolute; top: -3px; right: -3px;
            background: #ff0055; color: #fff; border-radius: 50%;
            padding: 2px 5px; font-size: 9px; min-width: 16px;
        }
        
        /* شريط التنقل السفلي */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 32px); max-width: 400px;
            background: rgba(0,5,10,0.9); backdrop-filter: blur(20px);
            border: 1px solid #00f2ff; border-radius: 40px;
            padding: 8px 16px; display: flex; justify-content: space-around; z-index: 100;
        }
        
        .nav-item {
            color: rgba(255,255,255,0.5); text-align: center; cursor: pointer;
            padding: 8px 12px; border-radius: 30px; transition: all 0.3s;
        }
        
        .nav-item.active { color: #00f2ff; background: rgba(0,242,255,0.1); }
        .nav-item i { font-size: 22px; }
        .nav-item span { font-size: 10px; display: block; margin-top: 3px; }
        
        /* زر الرفع - تصميم جديد */
        .upload-fab {
            position: fixed; bottom: 100px; right: 20px; z-index: 90;
            width: 56px; height: 56px; background: linear-gradient(135deg, #00f2ff, #0066ff);
            border: none; border-radius: 50%; color: #fff; font-size: 24px;
            cursor: pointer; box-shadow: 0 0 30px #00f2ff;
            display: flex; align-items: center; justify-content: center;
        }
        
        /* فيديو فيد */
        .video-feed {
            height: 100vh; width: 100vw; overflow-y: scroll;
            scroll-snap-type: y mandatory; scrollbar-width: none;
        }
        .video-feed::-webkit-scrollbar { display: none; }
        
        .video-item {
            height: 100vh; width: 100vw; scroll-snap-align: start;
            position: relative; background: #000;
        }
        .video-item video {
            width: 100%; height: 100%; object-fit: cover;
        }
        
        .video-overlay {
            position: absolute; bottom: 120px; right: 16px; left: 80px; color: #fff;
        }
        
        .video-actions {
            position: absolute; left: 16px; bottom: 140px;
            display: flex; flex-direction: column; gap: 20px;
        }
        
        .action-btn {
            width: 48px; height: 48px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border: 1px solid #00f2ff; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; cursor: pointer;
        }
        .action-btn i { font-size: 20px; }
        .action-btn span { font-size: 9px; margin-top: 2px; }
        
        /* نافذة الرفع - تصميم جديد بدون Cloudinary UI */
        .upload-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        
        .upload-box {
            max-width: 450px; width: 100%; background: #0a141e;
            border: 2px solid #00f2ff; border-radius: 30px; padding: 25px;
        }
        
        .upload-area {
            border: 2px dashed #00f2ff; border-radius: 20px; padding: 40px 20px;
            text-align: center; cursor: pointer; background: rgba(0,242,255,0.05);
        }
        
        .upload-area i { font-size: 50px; color: #00f2ff; }
        .upload-area p { margin: 15px 0 5px; font-size: 18px; }
        .upload-area span { font-size: 13px; opacity: 0.7; }
        
        .progress-container { margin: 20px 0; }
        .progress-bar {
            height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #00f2ff, #0066ff);
            width: 0%; transition: width 0.3s;
        }
        
        .preview-section { margin-top: 20px; }
        .preview-video { width: 100%; max-height: 200px; object-fit: contain; border-radius: 10px; }
        
        /* هاشتاغات */
        .hashtag {
            display: inline-block; background: rgba(0,242,255,0.1);
            border: 1px solid #00f2ff; border-radius: 20px;
            padding: 4px 12px; margin: 3px; color: #00f2ff; font-size: 12px;
        }
        
        /* لوحة التعليقات */
        .slide-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.98); backdrop-filter: blur(20px);
            border-radius: 30px 30px 0 0; padding: 20px; z-index: 150;
            transform: translateY(100%); transition: transform 0.3s;
            max-height: 60vh; overflow-y: auto;
            border-top: 1px solid #00f2ff;
        }
        .slide-panel.open { transform: translateY(0); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loadingScreen">
    <div class="loading-content">
        <i class="fas fa-lion"></i>
        <h1>VOID LION</h1>
        <div class="spinner"></div>
        <p id="loadingStatus" style="color:#00f2ff;margin-top:20px">جاري التحميل...</p>
    </div>
</div>

<div id="app">
    <!-- شريط علوي -->
    <div class="top-bar">
        <div class="top-bar-left">
            <div style="color:#00f2ff;font-family:monospace;font-size:14px" id="liveClock">00:00</div>
        </div>
        <div class="top-bar-right">
            <button class="icon-btn" onclick="VoidApp.openPanel('messagesPanel')">
                <i class="fas fa-comment-dots"></i>
            </button>
            <button class="icon-btn" onclick="VoidApp.openPanel('notificationsPanel')">
                <i class="fas fa-bell"></i>
                <span id="notifBadge" class="badge hidden">0</span>
            </button>
        </div>
    </div>

    <!-- الصفحة الرئيسية -->
    <section id="page-home" class="page active">
        <div id="videoFeed" class="video-feed"></div>
        
        <!-- أزرار التفاعل - تظهر مع كل فيديو -->
        <div id="videoActions" class="video-actions hidden">
            <button class="action-btn" onclick="VoidVideo.toggleLike()">
                <i class="fas fa-heart" id="likeIcon"></i>
                <span id="likeCount">0</span>
            </button>
            <button class="action-btn" onclick="VoidVideo.openComments()">
                <i class="fas fa-comment"></i>
                <span id="commentCount">0</span>
            </button>
            <button class="action-btn" onclick="VoidVideo.shareVideo()">
                <i class="fas fa-share"></i>
            </button>
        </div>
        
        <!-- زر الرفع -->
        <button class="upload-fab" onclick="VoidUpload.openModal()">
            <i class="fas fa-plus"></i>
        </button>
    </section>

    <!-- صفحة الاستكشاف -->
    <section id="page-explore" class="page">
        <div style="padding:70px 15px 100px">
            <div style="display:flex;align-items:center;background:rgba(255,255,255,0.1);border-radius:30px;padding:5px 15px;margin-bottom:20px">
                <i class="fas fa-search" style="color:#00f2ff"></i>
                <input type="text" id="searchInput" placeholder="ابحث..." style="flex:1;background:none;border:none;padding:12px;color:#fff;outline:none">
                <button onclick="VoidExplore.voiceSearch()" style="background:none;border:none;color:#00f2ff"><i class="fas fa-microphone"></i></button>
            </div>
            <div id="exploreGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:2px"></div>
        </div>
    </section>

    <!-- صفحة الملف الشخصي -->
    <section id="page-profile" class="page">
        <div id="profileCover" style="height:200px;background-size:cover;background-position:center"></div>
        <div style="padding:0 20px">
            <div style="position:relative;width:100px;margin-top:-50px">
                <img id="profileAvatar" src="" style="width:100px;height:100px;border-radius:50%;border:3px solid #000">
                <button onclick="VoidProfile.changeAvatar()" style="position:absolute;bottom:0;left:0;background:#00f2ff;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer"><i class="fas fa-camera"></i></button>
            </div>
            <h2 id="profileName" style="margin-top:15px"></h2>
            <p id="profileBio" style="color:#ccc;margin:10px 0"></p>
            <div style="display:flex;gap:30px;margin:20px 0">
                <div><span id="profileFollowers">0</span> متابع</div>
                <div><span id="profileFollowing">0</span> يتابع</div>
            </div>
            <button onclick="VoidProfile.edit()" style="width:100%;padding:14px;background:#00f2ff;border:none;border-radius:30px;font-weight:bold;cursor:pointer">تعديل الملف</button>
            <button onclick="VoidAuth.logout()" style="width:100%;padding:14px;background:#ff0055;border:none;border-radius:30px;color:#fff;font-weight:bold;margin-top:10px;cursor:pointer">تسجيل الخروج</button>
        </div>
    </section>

    <!-- شريط التنقل -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-page="home"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="nav-item" data-page="explore"><i class="fas fa-compass"></i><span>استكشاف</span></div>
        <div class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>حسابي</span></div>
    </nav>

    <!-- نافذة الرفع -->
    <div id="uploadModal" class="upload-modal hidden">
        <div class="upload-box">
            <div style="display:flex;justify-content:space-between;margin-bottom:20px">
                <h3 style="color:#00f2ff">🎬 رفع فيديو</h3>
                <button onclick="VoidUpload.closeModal()" style="background:none;border:none;color:#fff;font-size:24px;cursor:pointer">&times;</button>
            </div>
            
            <div id="uploadAreaBox">
                <div class="upload-area" onclick="document.getElementById('videoFileInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>اختر فيديو</p>
                    <span>MP4, MOV حتى 200MB</span>
                </div>
                <input type="file" id="videoFileInput" accept="video/*" style="display:none">
            </div>
            
            <div id="uploadProgressBox" class="hidden">
                <div style="display:flex;justify-content:space-between;margin-bottom:5px">
                    <span>جاري الرفع...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>
            
            <div id="videoInfoBox" class="hidden">
                <video id="videoPreview" class="preview-video" controls></video>
                <input type="text" id="videoTitle" placeholder="عنوان الفيديو" style="width:100%;padding:12px;margin:15px 0;background:rgba(255,255,255,0.1);border:1px solid #00f2ff;border-radius:10px;color:#fff">
                <textarea id="videoDescription" placeholder="وصف الفيديو... #هاشتاغ" style="width:100%;padding:12px;background:rgba(255,255,255,0.1);border:1px solid #00f2ff;border-radius:10px;color:#fff;height:80px"></textarea>
                <button onclick="VoidUpload.publish()" style="width:100%;padding:14px;background:linear-gradient(135deg,#00f2ff,#0066ff);border:none;border-radius:15px;font-weight:bold;margin-top:15px;cursor:pointer">نشر 🚀</button>
            </div>
        </div>
    </div>

    <!-- لوحة التعليقات -->
    <div id="commentsPanel" class="slide-panel">
        <div style="display:flex;justify-content:space-between;margin-bottom:15px">
            <h3 style="color:#00f2ff">💬 التعليقات</h3>
            <button onclick="VoidApp.closePanel('commentsPanel')" style="background:none;border:none;color:#fff;font-size:20px">&times;</button>
        </div>
        <div id="commentsList"></div>
        <div style="display:flex;gap:10px;margin-top:15px">
            <input type="text" id="commentInput" placeholder="أكتب تعليقاً..." style="flex:1;padding:12px;background:rgba(255,255,255,0.1);border:1px solid #00f2ff;border-radius:30px;color:#fff">
            <button onclick="VoidVideo.sendComment()" style="padding:12px 20px;background:#00f2ff;border:none;border-radius:30px;cursor:pointer"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- لوحة الرسائل -->
    <div id="messagesPanel" class="slide-panel">
        <div style="display:flex;justify-content:space-between;margin-bottom:15px">
            <h3 style="color:#00f2ff">💭 الرسائل</h3>
            <button onclick="VoidApp.closePanel('messagesPanel')" style="background:none;border:none;color:#fff;font-size:20px">&times;</button>
        </div>
        <div id="conversationsList"></div>
    </div>

    <!-- لوحة الإشعارات -->
    <div id="notificationsPanel" class="slide-panel">
        <div style="display:flex;justify-content:space-between;margin-bottom:15px">
            <h3 style="color:#00f2ff">🔔 الإشعارات</h3>
            <button onclick="VoidApp.closePanel('notificationsPanel')" style="background:none;border:none;color:#fff;font-size:20px">&times;</button>
        </div>
        <div id="notificationsList"></div>
    </div>

    <!-- نافذة المحادثة -->
    <div id="chatWindow" class="upload-modal hidden">
        <div class="upload-box" style="padding:15px">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:15px">
                <button onclick="VoidChat.closeChat()" style="background:none;border:none;color:#fff;font-size:20px"><i class="fas fa-arrow-right"></i></button>
                <img id="chatAvatar" src="" style="width:40px;height:40px;border-radius:50%">
                <div style="flex:1"><strong id="chatUsername"></strong></div>
            </div>
            <div id="chatMessages" style="height:300px;overflow-y:auto;margin-bottom:15px"></div>
            <div style="display:flex;gap:10px">
                <button onclick="VoidChat.attachImage()" style="background:none;border:none;color:#00f2ff;font-size:20px"><i class="fas fa-image"></i></button>
                <button onclick="VoidChat.toggleRecording()" style="background:none;border:none;color:#00f2ff;font-size:20px"><i class="fas fa-microphone"></i></button>
                <input type="text" id="messageInput" placeholder="اكتب..." style="flex:1;padding:10px;background:rgba(255,255,255,0.1);border:1px solid #00f2ff;border-radius:30px;color:#fff">
                <button onclick="VoidChat.sendMessage()" style="background:#00f2ff;border:none;border-radius:50%;width:40px;height:40px"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- زر الأدمن -->
    <button id="adminFAB" class="upload-fab hidden" style="bottom:170px;left:20px;right:auto;background:linear-gradient(135deg,#ffd700,#ff8c00)" onclick="window.location.href='admin.html'">
        <i class="fas fa-crown"></i>
    </button>
</div>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js', { scope: './' });
}
</script>
<script src="./js/firebase.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
