<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID LION | الدخول</title>
    <base href="./">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-lion"></i>
                <h1>VOID LION</h1>
                <p>بوابة الفراغ الرقمي</p>
            </div>
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">دخول</button>
                <button class="tab-btn" data-tab="register">حساب جديد</button>
            </div>
            <form id="loginForm" class="auth-form">
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="كلمة المرور" required></div>
                <button type="submit" class="btn-submit">دخول <i class="fas fa-arrow-left"></i></button>
            </form>
            <form id="registerForm" class="auth-form" style="display:none">
                <div class="input-group"><i class="fas fa-user"></i><input type="text" id="regUsername" placeholder="اسم المستخدم" required></div>
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="البريد الإلكتروني" required></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="كلمة المرور" required></div>
                <button type="submit" class="btn-submit">إنشاء حساب <i class="fas fa-user-plus"></i></button>
            </form>
            <div id="message" class="message"></div>
        </div>
    </div>
    <script src="./js/firebase.js"></script>
    <script src="./js/auth.js"></script>
    <script>
        const loginTab = document.querySelector('[data-tab="login"]');
        const registerTab = document.querySelector('[data-tab="register"]');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const msg = document.getElementById('message');
        
        loginTab.onclick = () => {
            loginTab.classList.add('active'); registerTab.classList.remove('active');
            loginForm.style.display = 'block'; registerForm.style.display = 'none';
        };
        registerTab.onclick = () => {
            registerTab.classList.add('active'); loginTab.classList.remove('active');
            registerForm.style.display = 'block'; loginForm.style.display = 'none';
        };
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            msg.textContent = 'جاري الدخول...'; msg.className = 'message';
            const r = await VoidAuth.login(loginEmail.value, loginPassword.value);
            msg.textContent = r.success ? 'تم الدخول!' : r.error;
            msg.className = 'message ' + (r.success ? 'success' : 'error');
            if (r.success) setTimeout(() => location.href = 'index.html', 500);
        };
        registerForm.onsubmit = async (e) => {
            e.preventDefault();
            if (regUsername.value.length < 3) { msg.textContent = 'اسم المستخدم 3 أحرف على الأقل'; msg.className = 'message error'; return; }
            msg.textContent = 'جاري إنشاء الحساب...'; msg.className = 'message';
            const r = await VoidAuth.register(regUsername.value, regEmail.value, regPassword.value);
            msg.textContent = r.success ? 'تم إنشاء الحساب!' : r.error;
            msg.className = 'message ' + (r.success ? 'success' : 'error');
            if (r.success) setTimeout(() => location.href = 'index.html', 500);
        };
    </script>
</body>
</html>
